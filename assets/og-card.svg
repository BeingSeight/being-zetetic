<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#3ad6c6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#3ad6c6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ad6c6"/>
      <stop offset="100%" stop-color="#6cf0e0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#07151a"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#163038" stroke-width="1"/>

  <!-- Top eyebrow -->
  <text x="80" y="120" font-family="JetBrains Mono, monospace" font-size="22" fill="#3ad6c6" letter-spacing="6">— A LEARNING PROTOCOL —</text>

  <!-- Brand mark -->
  <text x="80" y="220" font-family="Instrument Serif, Georgia, serif" font-size="92" fill="#eaf6f7">Being<tspan font-style="italic" fill="#3ad6c6">Zetetic</tspan></text>

  <!-- Headline -->
  <text x="80" y="340" font-family="Instrument Serif, Georgia, serif" font-size="56" fill="#eaf6f7" font-style="italic">Become the Being</text>
  <text x="80" y="410" font-family="Instrument Serif, Georgia, serif" font-size="56" fill="#eaf6f7" font-style="italic">that inquires.</text>

  <!-- Sub -->
  <text x="80" y="480" font-family="Inter, sans-serif" font-size="24" fill="#9ab6bb">A protocol that forces zero-to-mastery depth — every concept</text>
  <text x="80" y="514" font-family="Inter, sans-serif" font-size="24" fill="#9ab6bb">arises as a question from the previous one.</text>

  <!-- Bottom rail -->
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#1f4250" stroke-width="1"/>
  <text x="80" y="585" font-family="JetBrains Mono, monospace" font-size="18" fill="#3ad6c6">beingzetetic.com</text>
  <text x="1120" y="585" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="18" fill="#5b7a7f">Driven by Mnemethos · BeingSeight</text>
</svg>
